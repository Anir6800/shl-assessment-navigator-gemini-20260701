<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SHL Assessment Navigator</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1115;
      --panel: #171a21;
      --panel-2: #20242d;
      --border: #2d3340;
      --text: #edf2fb;
      --muted: #98a2b3;
      --accent: #10a37f;
      --accent-2: #2f81f7;
      --bubble-user: #1d2530;
      --bubble-assistant: #151922;
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top, rgba(16, 163, 127, 0.12), transparent 30%),
        linear-gradient(180deg, #0b0d11 0%, var(--bg) 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      padding: 18px;
    }

    .app {
      width: min(1100px, 100%);
      min-height: calc(100vh - 36px);
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border);
      background: rgba(11, 13, 17, 0.72);
      backdrop-filter: blur(16px);
      border-radius: 18px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
      background: rgba(23, 26, 33, 0.9);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .brand-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #6ee7b7);
      box-shadow: 0 0 18px rgba(16, 163, 127, 0.6);
    }

    .brand small {
      color: var(--muted);
      font-weight: 600;
    }

    .status {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .conversation {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .messages {
      flex: 1;
      overflow: auto;
      padding: 24px 18px 12px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .welcome {
      max-width: 820px;
      margin: 0 auto 8px;
      padding: 18px 20px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: rgba(23, 26, 33, 0.72);
      color: var(--muted);
      line-height: 1.6;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 10px auto 0;
      max-width: 820px;
    }

    .chip {
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      transition: transform 120ms ease, border-color 120ms ease, background 120ms ease;
    }

    .chip:hover {
      transform: translateY(-1px);
      border-color: rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.08);
    }

    .bubble {
      width: min(820px, 100%);
      margin: 0 auto;
      padding: 16px 18px;
      border: 1px solid var(--border);
      border-radius: 16px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
    }

    .bubble small {
      display: block;
      margin-bottom: 8px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.72rem;
    }

    .bubble.user {
      background: var(--bubble-user);
    }

    .bubble.assistant {
      background: var(--bubble-assistant);
    }

    .recommendations {
      width: min(820px, 100%);
      margin: 0 auto 8px;
      padding: 14px 0 0;
    }

    .recommendations h3 {
      margin: 0 0 12px;
      font-size: 0.82rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .rec-grid {
      display: grid;
      gap: 10px;
    }

    .rec {
      padding: 14px 16px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
    }

    .rec strong {
      display: block;
      margin-bottom: 6px;
      font-size: 0.98rem;
    }

    .badge {
      display: inline-block;
      margin-bottom: 8px;
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 0.75rem;
      color: #cfeee5;
      background: rgba(16, 163, 127, 0.12);
      border: 1px solid rgba(16, 163, 127, 0.25);
    }

    .rec a {
      color: #c8d7ff;
      text-decoration: none;
      word-break: break-all;
      font-size: 0.9rem;
    }

    .composer {
      padding: 14px 18px 18px;
      border-top: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(23, 26, 33, 0.68), rgba(15, 17, 21, 0.96));
    }

    .controls {
      display: flex;
      gap: 12px;
      align-items: end;
      width: min(820px, 100%);
      margin: 0 auto;
    }

    textarea {
      flex: 1;
      min-height: 54px;
      max-height: 180px;
      resize: vertical;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      padding: 14px 15px;
      font: inherit;
      outline: none;
      line-height: 1.5;
    }

    textarea:focus {
      border-color: rgba(47, 129, 247, 0.65);
      box-shadow: 0 0 0 3px rgba(47, 129, 247, 0.18);
    }

    .btn {
      border: 0;
      border-radius: 14px;
      padding: 13px 16px;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
      transition: transform 120ms ease, opacity 120ms ease;
    }

    .btn:hover { transform: translateY(-1px); }

    .btn.primary {
      color: #001a14;
      background: linear-gradient(135deg, #10a37f, #5ce0b2);
    }

    .btn.secondary {
      color: var(--text);
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
    }

    .actions {
      width: min(820px, 100%);
      margin: 10px auto 0;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .empty-state {
      width: min(820px, 100%);
      margin: 0 auto;
      padding: 16px 18px;
      color: var(--muted);
      border: 1px dashed rgba(255, 255, 255, 0.12);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.02);
      line-height: 1.6;
    }

    @media (max-width: 720px) {
      body { padding: 0; }
      .app {
        min-height: 100vh;
        border-radius: 0;
      }
      .controls {
        flex-direction: column;
        align-items: stretch;
      }
      .actions {
        justify-content: stretch;
      }
      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <span class="brand-dot"></span>
        <span>SHL Assessment Navigator</span>
        <small>chat</small>
      </div>
      <div class="status" id="status">Ready.</div>
    </header>

    <section class="conversation">
      <div id="messages" class="messages">
        <div class="welcome">
          Ask for an assessment, refine the shortlist, or compare two SHL tests. The assistant stays grounded in the catalog data.
        </div>
        <div class="chips" aria-label="Quick prompts">
          <button class="chip" data-prompt="I need an assessment.">I need an assessment.</button>
          <button class="chip" data-prompt="Need a technical assessment for a mid-level Java developer.">Java developer, mid-level</button>
          <button class="chip" data-prompt="Actually include personality tests.">Add personality tests</button>
          <button class="chip" data-prompt="OPQ32r vs GSA">Compare OPQ32r vs GSA</button>
        </div>
      </div>

      <div id="recs" class="recommendations"></div>

      <footer class="composer">
        <div class="controls">
          <textarea id="input" placeholder="Message SHL Assessment Navigator..." rows="2"></textarea>
          <button id="send" class="btn primary">Send</button>
          <button id="clear" class="btn secondary" type="button">Clear</button>
        </div>
        <div class="actions">
          <button class="btn secondary" type="button" id="copy-transcript">Copy transcript</button>
          <button class="btn secondary" type="button" id="scroll-bottom">Scroll to latest</button>
        </div>
      </footer>
    </section>
  </main>

  <script>
    const messages = [];
    const transcriptEl = document.getElementById('messages');
    const recsEl = document.getElementById('recs');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const clearBtn = document.getElementById('clear');
    const statusEl = document.getElementById('status');
    const quickButtons = document.querySelectorAll('[data-prompt]');

    function escapeHtml(text) {
      return text
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function setStatus(text, busy = false) {
      statusEl.dataset.status = text;
      statusEl.textContent = text;
      sendBtn.disabled = busy;
      inputEl.disabled = busy;
      quickButtons.forEach((btn) => btn.disabled = busy);
    }

    function clearTranscript() {
      transcriptEl.innerHTML = `
        <div class="welcome">
          Ask for an assessment, refine the shortlist, or compare two SHL tests. The assistant stays grounded in the catalog data.
        </div>
        <div class="chips" aria-label="Quick prompts">
          <button class="chip" data-prompt="I need an assessment.">I need an assessment.</button>
          <button class="chip" data-prompt="Need a technical assessment for a mid-level Java developer.">Java developer, mid-level</button>
          <button class="chip" data-prompt="Actually include personality tests.">Add personality tests</button>
          <button class="chip" data-prompt="OPQ32r vs GSA">Compare OPQ32r vs GSA</button>
        </div>`;
      recsEl.innerHTML = '';
      messages.length = 0;
      setStatus('Ready.');
      bindQuickButtons();
    }

    function removeWelcome() {
      const welcome = transcriptEl.querySelector('.welcome');
      if (welcome) welcome.remove();
      const chips = transcriptEl.querySelector('.chips');
      if (chips) chips.remove();
    }

    function appendBubble(role, text) {
      removeWelcome();
      const bubble = document.createElement('div');
      bubble.className = `bubble ${role}`;
      const label = document.createElement('small');
      label.textContent = role === 'user' ? 'You' : 'Assistant';
      const body = document.createElement('div');
      body.textContent = text;
      bubble.appendChild(label);
      bubble.appendChild(body);
      transcriptEl.appendChild(bubble);
      transcriptEl.scrollTop = transcriptEl.scrollHeight;
    }

    function renderRecommendations(items) {
      recsEl.innerHTML = '';
      if (!items.length) return;

      const wrapper = document.createElement('div');
      wrapper.className = 'recommendations';
      wrapper.innerHTML = '<h3>Recommendations</h3>';

      const grid = document.createElement('div');
      grid.className = 'rec-grid';

      items.forEach((item) => {
        const card = document.createElement('div');
        card.className = 'rec';
        card.innerHTML = `
          <div class="badge">${escapeHtml(item.test_type)}</div>
          <strong>${escapeHtml(item.name)}</strong>
          <a href="${escapeHtml(item.url)}" target="_blank" rel="noreferrer">${escapeHtml(item.url)}</a>
        `;
        grid.appendChild(card);
      });

      wrapper.appendChild(grid);
      recsEl.appendChild(wrapper);
    }

    async function submitPrompt(prompt) {
      const text = (prompt || inputEl.value).trim();
      if (!text) return;

      inputEl.value = '';
      messages.push({ role: 'user', content: text });
      appendBubble('user', text);
      setStatus('Thinking...', true);

      try {
        const response = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages }),
        });
        if (!response.ok) throw new Error(`Request failed with status ${response.status}`);

        const data = await response.json();
        messages.push({ role: 'assistant', content: data.reply });
        appendBubble('assistant', data.reply);
        renderRecommendations(data.recommendations || []);
        setStatus(data.end_of_conversation ? 'Conversation complete.' : 'Ready for the next turn.');
      } catch (error) {
        console.error(error);
        appendBubble('assistant', 'I could not reach the chat service. Check the backend logs and try again.');
        setStatus('The chat endpoint is unavailable right now.');
      } finally {
        setStatus(statusEl.dataset.status || 'Ready.', false);
      }
    }

    function bindQuickButtons() {
      document.querySelectorAll('[data-prompt]').forEach((button) => {
        button.addEventListener('click', () => submitPrompt(button.dataset.prompt));
      });
    }

    bindQuickButtons();
    sendBtn.addEventListener('click', () => submitPrompt());
    clearBtn.addEventListener('click', clearTranscript);
    document.getElementById('copy-transcript').addEventListener('click', async () => {
      const transcript = messages.map((m) => `${m.role.toUpperCase()}: ${m.content}`).join('\n');
      await navigator.clipboard.writeText(transcript || '');
      setStatus('Transcript copied to clipboard.');
      setTimeout(() => setStatus('Ready.'), 1200);
    });
    document.getElementById('scroll-bottom').addEventListener('click', () => {
      transcriptEl.scrollTop = transcriptEl.scrollHeight;
    });
    inputEl.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        submitPrompt();
      }
    });
  </script>
</body>
</html>
